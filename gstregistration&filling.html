<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GST Registration - UDYOG PRABHA</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 text-gray-800">

  <header class="bg-blue-900 text-white p-4 text-center font-bold text-xl">
    GST Registration & Filing - UDYOG PRABHA
  </header>

  <section class="max-w-2xl mx-auto mt-6 bg-white p-6 rounded shadow">
    <h2 class="text-xl font-bold text-blue-700 mb-4">Apply for GST Services</h2>

    <form id="gstForm" enctype="multipart/form-data" class="grid gap-4">
      <input type="text" name="name" placeholder="Full Name" required class="border px-4 py-2 rounded" />
      <input type="text" name="businessName" placeholder="Business Name" required class="border px-4 py-2 rounded" />
      <input type="email" name="email" placeholder="Email" required class="border px-4 py-2 rounded" />
      <input type="tel" name="phone" placeholder="Phone Number" required class="border px-4 py-2 rounded" />
      <input type="text" name="pan" placeholder="PAN Number" required class="border px-4 py-2 rounded" />
      <textarea name="address" placeholder="Business Address" rows="3" required class="border px-4 py-2 rounded"></textarea>

      <label class="text-sm font-medium">Upload Business License (PDF/JPG/PNG)</label>
      <input type="file" name="licenseFile" accept=".pdf,.jpg,.jpeg,.png" required class="border px-4 py-2 rounded" />

      <button type="submit" class="bg-blue-700 text-white py-2 rounded hover:bg-blue-800">Submit</button>
    </form>

    <p id="successMsg" class="hidden mt-4 text-green-600 font-semibold">✅ Application submitted successfully!</p>
  </section>

  <script>
    const form = document.getElementById('gstForm');
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const formData = new FormData(form);

      const res = await fetch('http://localhost:5000/api/gst-registration', {
        method: 'POST',
        body: formData
      });

      if (res.ok) {
        document.getElementById('successMsg').classList.remove('hidden');
        form.reset();
      }
    });
  </script>

</body>
</html>
