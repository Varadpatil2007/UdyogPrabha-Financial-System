<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>UDYOG PRABHA</title>
  <script src="https://cdn.tailwindcss.com"></script>
  

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="login.js" defer></script>
</head>
<body class="bg-gray-50 text-gray-800">

  <!-- Top Strip -->
  <div class="bg-blue-900 text-white text-sm py-2 px-4 flex justify-between items-center">
    <span>Ministry of MSME Supported | Call us: +91 9876543210</span>
    <span>udyogprabha@email.com</span>
  </div>

  <!-- Navbar -->
  <header class="bg-white shadow px-4 py-3 flex justify-between items-center">
    <div class="flex items-center gap-3">
      <img src="udyog.jpg" alt="Logo" class="h-12 w-12 rounded" />
      <h1 class="text-xl font-bold text-blue-800">UDYOG PRABHA</h1>
    </div>
    <div class="md:hidden" id="menu-btn">
      <svg class="w-6 h-6 text-gray-700" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M4 6h16M4 12h16M4 18h16"/>
      </svg>
    </div>
    <nav class="hidden md:flex gap-6 text-sm font-semibold text-gray-700" id="navbar">
      <a href="index.html" class="hover:text-blue-600">Home</a>
      <a href="service.html" class="hover:text-blue-600">Services</a>
      <a href="about.html" class="hover:text-blue-600">About</a>
      <a href="contact.html" class="hover:text-blue-600">Contact</a>
    </nav>
  </header>

  <!-- Mobile Nav -->
  <nav id="mobileNav" class="md:hidden hidden bg-white shadow p-4 flex flex-col space-y-2 text-sm font-semibold">
    <a href="#" class="hover:text-blue-600">Home</a>
    <a href="#" class="hover:text-blue-600">Services</a>
    <a href="#" class="hover:text-blue-600">About</a>
    <a href="#" class="hover:text-blue-600">Contact</a>
    <a href="#" class="bg-blue-600 text-white px-3 py-1 rounded text-center hover:bg-blue-700">Login</a>
  </nav>

  <!-- Auth/Login Section -->
  <section class="max-w-xl mx-auto my-10 bg-white shadow p-6 rounded">
    <h2 class="text-xl font-bold mb-4 text-blue-700">Client Login</h2>
    <input id="email" type="email" placeholder="Email" class="w-full mb-3 px-3 py-2 border rounded" />
    <input id="password" type="password" placeholder="Password" class="w-full mb-3 px-3 py-2 border rounded" />
    <button onclick="login()" class="bg-blue-600 text-white w-full py-2 rounded hover:bg-blue-700">Login</button>
    <p id="loginStatus" class="mt-3 text-sm text-red-500"></p>
  </section>

  <!-- Footer -->
  <footer class="bg-blue-900 text-white text-sm py-4 text-center">
    &copy; 2025 UDYOG PRABHA. All Rights Reserved.
  </footer>
</body>
</html>
